services:

  # =========================================================================
  # INFRASTRUCTURE PARTAGÉE
  # =========================================================================

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./backend-pays/src/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    networks:
      - futurekawa-network

  # =========================================================================
  # BASE DE DONNÉES — PAYS (Brésil dans cet exemple)
  # =========================================================================

  postgres-pays:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${PAYS_DB_USER}
      POSTGRES_PASSWORD: ${PAYS_DB_PASSWORD}
      POSTGRES_DB:       ${PAYS_DB_NAME}
    volumes:
      - postgres-pays-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYS_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futurekawa-network

  # =========================================================================
  # BASE DE DONNÉES — CENTRALE (utilisateurs, rôles, accès)
  # =========================================================================

  postgres-central:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${CENTRAL_DB_USER}
      POSTGRES_PASSWORD: ${CENTRAL_DB_PASSWORD}
      POSTGRES_DB:       futurekawa_central
    volumes:
      - postgres-central-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CENTRAL_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futurekawa-network

  # =========================================================================
  # BACKEND PAYS (Brésil dans cet exemple)
  # =========================================================================

  backend-pays:
    build:
      context: ./backend-pays
      dockerfile: Dockerfile
    environment:
      PAYS:         ${PAYS}
      DATABASE_URL: postgresql://${PAYS_DB_USER}:${PAYS_DB_PASSWORD}@postgres-pays:5432/${PAYS_DB_NAME}
      MQTT_BROKER:  mosquitto
      MQTT_PORT:    1883
      JWT_SECRET:   ${JWT_SECRET}
      SMTP_SERVER:  ${SMTP_SERVER}
      SMTP_PORT:    ${SMTP_PORT}
      SENDER_EMAIL:    ${SENDER_EMAIL}
      SENDER_PASSWORD: ${SENDER_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres-pays:
        condition: service_healthy
    networks:
      - futurekawa-network

  # =========================================================================
  # BACKEND CENTRAL (SIÈGE)
  # =========================================================================

  backend-central:
    build:
      context: ./backend-central
      dockerfile: Dockerfile
    environment:
      DATABASE_URL:         postgresql://${CENTRAL_DB_USER}:${CENTRAL_DB_PASSWORD}@postgres-central:5432/futurekawa_central
      JWT_SECRET:           ${JWT_SECRET}
      ADMIN_EMAIL:          ${ADMIN_EMAIL}
      ADMIN_PASSWORD:       ${ADMIN_PASSWORD}
      COUNTRY_BRESIL_URL:   http://backend-pays:8000
      COUNTRY_EQUATEUR_URL: ${COUNTRY_EQUATEUR_URL}
      COUNTRY_COLOMBIE_URL: ${COUNTRY_COLOMBIE_URL}
    ports:
      - "9000:9000"
    depends_on:
      postgres-central:
        condition: service_healthy
      backend-pays:
        condition: service_started
    networks:
      - futurekawa-network

networks:
  futurekawa-network:
    driver: bridge

volumes:
  postgres-pays-data:
  postgres-central-data:
