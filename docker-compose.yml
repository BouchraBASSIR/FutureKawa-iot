services:

  # =========================================================================
  # INFRASTRUCTURE PAYS (BRÉSIL)
  # =========================================================================

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./backend-pays/src/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    networks:
      - futurekawa-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-futurekawa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-futurekawa123}
      POSTGRES_DB:       ${POSTGRES_DB:-futurekawa_bresil}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-futurekawa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futurekawa-network

  backend-pays:
    build:
      context: ./backend-pays
      dockerfile: Dockerfile
    environment:
      PAYS:         ${PAYS:-bresil}
      DATABASE_URL: postgresql://${POSTGRES_USER:-futurekawa}:${POSTGRES_PASSWORD:-futurekawa123}@postgres:5432/${POSTGRES_DB:-futurekawa_bresil}
      MQTT_BROKER:  mosquitto
      MQTT_PORT:    1883
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - futurekawa-network

  # =========================================================================
  # BACKEND CENTRAL (SIÈGE)
  # =========================================================================

  backend-central:
    build:
      context: ./backend-central
      dockerfile: Dockerfile
    environment:
      COUNTRY_BRESIL_URL:   http://backend-pays:8000
      COUNTRY_EQUATEUR_URL: ${COUNTRY_EQUATEUR_URL:-http://backend-equateur:8001}
      COUNTRY_COLOMBIE_URL: ${COUNTRY_COLOMBIE_URL:-http://backend-colombie:8002}
    ports:
      - "9000:9000"
    depends_on:
      - backend-pays
    networks:
      - futurekawa-network

networks:
  futurekawa-network:
    driver: bridge

volumes:
  postgres-data:
