# ============================================================
# FutureKawa - SonarQube Configuration
# Backend Central (FastAPI)
# ============================================================

# ------------------------------------------------------------------
# Informations du projet
# ------------------------------------------------------------------
sonar.projectKey=futurekawa-backend-central
sonar.projectName=FutureKawa Backend Central
sonar.projectVersion=1.0

# ------------------------------------------------------------------
# Connexion SonarQube
# (L'URL peut être retirée si elle est définie dans Jenkins)
# ------------------------------------------------------------------
sonar.host.url=http://localhost:9000

# ------------------------------------------------------------------
# Encodage
# ------------------------------------------------------------------
sonar.sourceEncoding=UTF-8

# ------------------------------------------------------------------
# Langage
# ------------------------------------------------------------------
sonar.python.version=3.11

# ------------------------------------------------------------------
# Répertoires du projet
# ------------------------------------------------------------------
sonar.sources=src
sonar.tests=tests

# ------------------------------------------------------------------
# Détection des fichiers de tests
# ------------------------------------------------------------------
sonar.test.inclusions=tests/**/*.py

# ------------------------------------------------------------------
# Exclusions
# ------------------------------------------------------------------
sonar.exclusions=**/__pycache__/**,**/*.pyc

# ------------------------------------------------------------------
# Rapport de couverture Pytest
# (sera généré par Jenkins)
# ------------------------------------------------------------------
sonar.python.coverage.reportPaths=coverage.xml

# ------------------------------------------------------------------
# Rapport xUnit Pytest
# (sera généré par Jenkins)
# ------------------------------------------------------------------
sonar.python.xunit.reportPath=pytest-report.xml

# ------------------------------------------------------------------
# Exclusions de la couverture
# ------------------------------------------------------------------
sonar.coverage.exclusions=tests/**

# ------------------------------------------------------------------
# Analyse des duplications
# ------------------------------------------------------------------
sonar.cpd.exclusions=tests/**