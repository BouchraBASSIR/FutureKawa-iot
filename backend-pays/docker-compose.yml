services:

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./src/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "${MOSQUITTO_PORT:-1883}:1883"
    networks:
      - pays-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-futurekawa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-futurekawa123}
      POSTGRES_DB:       ${POSTGRES_DB:-futurekawa_bresil}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-futurekawa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pays-network

  backend-pays:
    build: .
    environment:
      PAYS:         ${PAYS:-bresil}
      DATABASE_URL: postgresql://${POSTGRES_USER:-futurekawa}:${POSTGRES_PASSWORD:-futurekawa123}@postgres:5432/${POSTGRES_DB:-futurekawa_bresil}
      MQTT_BROKER:  mosquitto
      MQTT_PORT:    1883
      SMTP_SERVER:  ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT:    ${SMTP_PORT:-587}
      SENDER_EMAIL:    ${SENDER_EMAIL:-}
      SENDER_PASSWORD: ${SENDER_PASSWORD:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/').raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pays-network

networks:
  pays-network:
    driver: bridge

volumes:
  postgres-data:
