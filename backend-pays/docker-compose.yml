services:

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./src/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "${MOSQUITTO_PORT}:1883"
    networks:
      - pays-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${PAYS_DB_USER}
      POSTGRES_PASSWORD: ${PAYS_DB_PASSWORD}
      POSTGRES_DB:       ${PAYS_DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYS_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pays-network

  backend-pays:
    build: .
    environment:
      PAYS:            ${PAYS}
      DATABASE_URL:    postgresql://${PAYS_DB_USER}:${PAYS_DB_PASSWORD}@postgres:5432/${PAYS_DB_NAME}
      MQTT_BROKER:     mosquitto
      MQTT_PORT:       1883
      JWT_SECRET:      ${JWT_SECRET}
      SMTP_SERVER:     ${SMTP_SERVER}
      SMTP_PORT:       ${SMTP_PORT}
      SENDER_EMAIL:    ${SENDER_EMAIL}
      SENDER_PASSWORD: ${SENDER_PASSWORD}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/').raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pays-network

networks:
  pays-network:
    driver: bridge

volumes:
  postgres-data:
